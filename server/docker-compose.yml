services:
  db:
    image: mysql:8.0
    container_name: car_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: car_rental_db
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql-init:/docker-entrypoint-initdb.d
    command: ["mysqld", "--default-authentication-plugin=mysql_native_password"]

  api:
    build: .
    container_name: car_api
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PORT: 5000
      DB_HOST: db
      DB_USER: appuser
      DB_PASSWORD: apppass
      DB_NAME: car_rental_db
      JWT_SECRET: dev_secret_change_me
    ports:
      - "5000:5000"
  client:
    build: ../client
    container_name: car_client
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - HOST=0.0.0.0
      - PORT=3000
    depends_on:
      - api


volumes:
  db_data:
